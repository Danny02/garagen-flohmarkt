name = "garagen-flohmarkt-worker"
main = "src/index.ts"
compatibility_date = "2024-12-30"
workers_dev = true

# ── Top-level defaults used by local dev and tests ───────────────────────────
# Keep bindings local/in-memory safe here.
[[kv_namespaces]]
binding = "GARAGEN_KV"
id      = "ffffffffffffffffffffffffffffffff"

[vars]
ALLOWED_ORIGINS = "http://localhost:5173"

# ── Production environment ───────────────────────────────────────────────────
[env.production]

[[env.production.kv_namespaces]]
binding = "GARAGEN_KV"
id      = "25cb43d0325c4f6e9d07bcd0427c7791"

# Required for passkey support in production.
[env.production.vars]
ALLOWED_ORIGINS = "https://garagen-flohmarkt.pages.dev"
